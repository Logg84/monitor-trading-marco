name: Controllo alert prezzi

on:
  schedule:
    - cron: "*/5 * * * *"  # ogni 5 minuti, 24/7 (UTC)
  workflow_dispatch: {}       # permette anche l'avvio manuale da GitHub

permissions:
  contents: write  # necessario per fare commit di alert_state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install pandas yfinance requests

      - name: Esegui controllo alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_checker.py

      - name: Commit stato alert (se cambiato)
        run: |
          git config user.name "alert-bot"
          git config user.email "alert-bot@users.noreply.github.com"
          git add alert_state.json
          git diff --staged --quiet || git commit -m "Aggiorna stato alert"
          git push
